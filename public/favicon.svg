<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1B3464"/>
  <!-- Orbital paths — white on dark bg -->
  <g fill="none" stroke="#FAFAFA" stroke-width="1.1" stroke-linecap="round" opacity="0.9">
    <!-- Near-horizontal ellipse -->
    <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(0 16 16)"/>
    <!-- Tilted 45° -->
    <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(45 16 16)"/>
    <!-- Tilted 90° (vertical) -->
    <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(90 16 16)"/>
    <!-- Tilted 135° -->
    <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(135 16 16)"/>
  </g>
  <!-- Colored dots -->
  <circle cx="5.2" cy="16" r="1.6" fill="#FAFAFA"/>
  <circle cx="19.8" cy="5.8" r="1.4" fill="#C84330"/>
  <circle cx="26.8" cy="16" r="1.6" fill="#FAFAFA"/>
  <circle cx="12.2" cy="26.2" r="1.4" fill="#D98B10"/>
  <circle cx="22.4" cy="24.6" r="1.3" fill="#C84330"/>
  <circle cx="9.6" cy="7.4" r="1.3" fill="#D98B10"/>
</svg>
